# Conda environment aligned with reference env `xyz` (Python 3.13.9).
# Create: conda env create -f environment.yml
# Activate: conda activate fairfluids
# Then (optional): pip install -r requirements-conda.txt

name: fairfluids
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip

  # Core
  - pydantic>=2.11
  - lxml>=5.3
  - numpy>=2.2
  - pandas>=2.2
  - requests>=2.32

  # Scientific computing and visualization
  - matplotlib>=3.10
  - scipy>=1.16
  - seaborn>=0.13

  # Jupyter / notebooks
  - ipykernel>=6.29
  - jupyter_client>=8.6
  - nbconvert>=7.16
  - nbformat>=5.10

  # Testing
  - pytest>=7.4

  # Pip-only packages (versions from env `xyz`)
  - pip:
      - pydantic-xml>=2.17.0
      - neo4j>=5.14.1
      - openpyxl>=3.1.5
      - plotly>=5.17.0
      - flask>=2.3.3
      - pint>=0.25.2
      - numpyro>=0.20.1
      - jax>=0.7.2
      - jaxlib>=0.7.2
      - arviz>=0.22.0
      - arviz-plots>=1.0.0
      - arviz-base>=1.0.0
      - arviz-stats>=1.0.0
      - pytest-asyncio>=0.21.2
      - -e .
